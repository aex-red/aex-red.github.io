<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ᚨᛖᚷ — AeX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Share+Tech+Mono&family=Crimson+Pro:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0a0b;
      --border:    #2a1f20;
      --muted:     #4a3535;
      --text:      #c4b8b8;
      --dim:       #6b5555;
      --accent:    #8b2020;
      --accent-hi: #b03030;
      --accent-lo: #5a1515;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', Georgia, serif;
      font-weight: 300;
      overflow-x: hidden;
    }

    /* Grain */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
    }

    /* Glow */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 50% 30% at 50% -5%, rgba(139,32,32,0.18) 0%, transparent 70%),
        radial-gradient(ellipse 100% 50% at 50% 100%, rgba(10,6,6,0.8) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      max-width: 660px;
      margin: 0 auto;
      padding: 0 2.5rem;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6rem 0 4rem;
    }

    /* Logo image */
    .logo-mark {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 1.5rem;
      opacity: 0.92;
      filter: drop-shadow(0 0 20px rgba(139,32,32,0.4));
      animation: fadeIn 1.2s ease both;
    }

    /* Rune mark */
    .rune-mark {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      color: var(--accent);
      opacity: 0.55;
      margin-bottom: 0.75rem;
      animation: fadeIn 1.4s ease 0.1s both;
    }

    /* Main logotype */
    h1 {
      font-family: 'Pirata One', serif;
      font-weight: 400;
      font-size: clamp(4.5rem, 15vw, 8.5rem);
      line-height: 0.9;
      letter-spacing: 0.06em;
      color: #d4c4c4;
      text-shadow:
        0 0 60px rgba(139,32,32,0.3),
        0 2px 6px rgba(0,0,0,0.9);
      margin-bottom: 0.1em;
      animation: fadeUp 1s ease 0.15s both;
    }

    h1 em {
      color: var(--accent-hi);
      font-style: normal;
      text-shadow:
        0 0 40px rgba(176,48,48,0.6),
        0 0 80px rgba(139,32,32,0.25),
        0 2px 6px rgba(0,0,0,0.9);
    }

    /* Rule */
    .rule {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 2rem 0;
      animation: fadeIn 1s ease 0.35s both;
    }

    .rule::before,
    .rule::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--accent-lo), transparent);
    }

    .rule span {
      font-size: 0.6rem;
      color: var(--accent);
      opacity: 0.45;
      letter-spacing: 0.3em;
      font-family: 'Share Tech Mono', monospace;
    }

    /* Bio */
    .bio {
      font-size: 1.15rem;
      line-height: 1.75;
      color: var(--dim);
      max-width: 44ch;
      animation: fadeUp 1s ease 0.45s both;
    }

    .bio strong {
      color: var(--text);
      font-weight: 400;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 2rem;
      animation: fadeUp 1s ease 0.55s both;
    }

    .tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.3em 0.75em;
      text-transform: uppercase;
      background: rgba(139,32,32,0.04);
    }

    /* Navigation */
    nav {
      margin-top: 3.5rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 1s ease 0.65s both;
    }

    nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.1rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-family: 'Pirata One', serif;
      font-size: 1.3rem;
      letter-spacing: 0.12em;
      transition: color 0.2s, padding-left 0.25s;
      cursor: not-allowed;
      opacity: 0.25;
    }

    nav a.active {
      cursor: pointer;
      opacity: 0.8;
    }

    nav a.active:hover {
      color: var(--accent-hi);
      padding-left: 0.75rem;
      opacity: 1;
    }

    nav a .meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      transition: color 0.2s;
    }

    nav a.active:hover .meta {
      color: var(--accent);
    }

    /* Footer */
    footer {
      padding: 1.75rem 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      opacity: 0.4;
      text-transform: uppercase;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 1.5rem; }
      main { padding: 4rem 0 3rem; }
      .logo-mark { width: 90px; height: 90px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <main>

      <img class="logo-mark" src="logo.png" alt="AeX" />

      <div class="rune-mark">ᚨ · ᛖ · ᚷ</div>

      <h1>A<em>e</em>X</h1>

      <div class="rule"><span>✦</span></div>

      <p class="bio">
        <strong>Penetration tester.</strong> [Bio placeholder — to be written.]
      </p>

      <div class="tags">
        <span class="tag">Red Team</span>
        <span class="tag">Active Directory</span>
        <span class="tag">ADCS</span>
        <span class="tag">OSINT</span>
      </div>

      <nav>
        <a href="#" title="Coming soon">
          <span>Tools</span>
          <span class="meta">// coming soon</span>
        </a>
        <a href="#" title="Coming soon">
          <span>Vault</span>
          <span class="meta">// coming soon</span>
        </a>
        <a href="#" title="Coming soon">
          <span>CTFs</span>
          <span class="meta">// coming soon</span>
        </a>
        <a class="active" href="mailto:aex@aex.red">
          <span>Contact</span>
          <span class="meta">aex@aex.red</span>
        </a>
      </nav>
