<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ᚨᛖᚷ — AeX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0a0a0b;
      --surface:  #111114;
      --border:   #222228;
      --muted:    #3a3a45;
      --text:     #c8c8d4;
      --dim:      #666678;
      --accent:   #a87c4f;
      --accent2:  #6a7fa8;
      --glow:     rgba(168, 124, 79, 0.12);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Cormorant', serif;
      font-weight: 300;
      letter-spacing: 0.02em;
      overflow-x: hidden;
    }

    /* Noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.6;
    }

    /* Subtle vertical gradient */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(168,124,79,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: grid;
      grid-template-rows: 1fr auto;
      max-width: 680px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 6rem 0 4rem;
    }

    /* Rune mark */
    .rune-mark {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.4em;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 2rem;
      animation: fadeIn 1.2s ease both;
    }

    /* Main name */
    h1 {
      font-family: 'Cormorant', serif;
      font-weight: 300;
      font-size: clamp(3.5rem, 10vw, 6rem);
      line-height: 0.9;
      letter-spacing: -0.02em;
      color: #e8e8f0;
      margin-bottom: 0.15em;
      animation: fadeUp 1s ease 0.1s both;
    }

    h1 span {
      color: var(--accent);
    }

    /* Divider */
    .rule {
      width: 3rem;
      height: 1px;
      background: linear-gradient(to right, var(--accent), transparent);
      margin: 2rem 0;
      animation: fadeIn 1s ease 0.3s both;
    }

    /* Bio */
    .bio {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--dim);
      max-width: 42ch;
      animation: fadeUp 1s ease 0.4s both;
    }

    .bio em {
      color: var(--text);
      font-style: normal;
    }

    /* Tags */
    .tags {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-top: 2rem;
      animation: fadeUp 1s ease 0.5s both;
    }

    .tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 0.3em 0.8em;
      text-transform: uppercase;
    }

    /* Links */
    nav {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 3.5rem;
      border-top: 1px solid var(--border);
      animation: fadeUp 1s ease 0.6s both;
    }

    nav a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      transition: color 0.2s, padding-left 0.2s;
      cursor: not-allowed;
      opacity: 0.5;
    }

    nav a.active {
      cursor: pointer;
      opacity: 1;
    }

    nav a.active:hover {
      color: var(--accent);
      padding-left: 0.5rem;
    }

    nav a .link-meta {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    nav a.active:hover .link-meta {
      color: var(--accent);
      opacity: 0.6;
    }

    nav a .arrow {
      opacity: 0.3;
      transition: opacity 0.2s, transform 0.2s;
    }

    nav a.active:hover .arrow {
      opacity: 1;
      transform: translateX(4px);
    }

    /* Footer */
    footer {
      padding: 2rem 0;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      opacity: 0.5;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    @media (max-width: 480px) {
      .container { padding: 0 1.25rem; }
      main { padding: 4rem 0 3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <main>

      <div class="rune-mark">ᚨ ᛖ ᚷ</div>

      <h1>Ae<span>X</span></h1>

      <div class="rule"></div>

      <p class="bio">
        <em>Penetration tester.</em> [Bio placeholder — to be written.]
      </p>

      <div class="tags">
        <span class="tag">Red Team</span>
        <span class="tag">Active Directory</span>
        <span class="tag">ADCS</span>
        <span class="tag">OSINT</span>
      </div>

      <nav>
        <a href="#" title="Coming soon">
          <span>GitHub</span>
          <span class="link-meta">// coming soon</span>
        </a>
        <a href="#" title="Coming soon">
          <span>Writeups</span>
          <span class="link-meta">// coming soon</span>
        </a>
        <a href="#" title="Coming soon">
          <span>LinkedIn</span>
          <span class="link-meta">// coming soon</span>
        </a>
        <a class="active" href="mailto:aex@aex.red">
          <span>Contact</span>
          <div style="display:flex;align-items:center;gap:1rem;">
            <span class="link-meta">aex@aex.red</span>
            <span class="arrow">→</span>
          </div>
        </a>
      </nav>

    </main>

    <footer>
      <span>AEX.RED</span>
      <span>ᚨᛖᚷ</span>
    </footer>
  </div>
</body>
</html>
